<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Administrativo</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
width:320px;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
box-sizing:border-box;
}

button{
width:100%;
padding:10px;
border:none;
background:#0d6efd;
color:#fff;
cursor:pointer;
border-radius:4px;
}

button:hover{
opacity:.9;
}

#mensagem{
margin-top:10px;
text-align:center;
color:red;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Painel Administrativo</h2>

<input
type="email"
id="email"
placeholder="E-mail"
>

<input
type="password"
id="senha"
placeholder="Senha"
>

<button onclick="login()">
Entrar
</button>

<div id="mensagem"></div>

</div>

<script>

const SUPABASE_URL =
"https://nvrxwausxepoikcdxule.supabase.co";

const SUPABASE_KEY =
"sb_publishable_u5pOZTC_-KTvXHJdL1rIIA_X_KSM1CT";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

async function login(){

const email =
document.getElementById("email").value;

const senha =
document.getElementById("senha").value;

const mensagem =
document.getElementById("mensagem");

const { error } =
await supabaseClient.auth.signInWithPassword({
email,
password: senha
});

if(error){

mensagem.innerText =
"E-mail ou senha inválidos.";

return;

}

window.location.href =
"admin.html";

}

</script>

</body>
</html>
