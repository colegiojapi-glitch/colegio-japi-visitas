<!DOCTYPE html>

<html lang="pt-BR">
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo - Colégio Japi</title>

  <link rel="stylesheet" href="admin.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

<div class="container">

  <h1>Painel Administrativo</h1>
  
<button onclick="logout()">
Sair
</button>
  
  <h2>Nova Data</h2>

  <div class="nova-data">

```
<input
  type="date"
  id="novaData"
>

<button onclick="criarData()">
  Criar Data
</button>
```

  </div>

  <h2>Datas Disponíveis</h2>

  <table>

```
<thead>
  <tr>
    <th>Data</th>
    <th>Status</th>
    <th>Ação</th>
  </tr>
</thead>

<tbody id="listaDatas">
  <tr>
    <td colspan="3">
      Carregando...
    </td>
  </tr>
</tbody>
```

  </table>

<br><br>

  <h2>Agendamentos</h2>

  <button onclick="exportarExcel()">
Exportar Excel
</button>
  
  <table>

```
<thead>
  <tr>
    <th>Data</th>
    <th>Horário</th>
    <th>Responsável</th>
    <th>Aluno</th>
    <th>Turma</th>
    <th>Telefone</th>
    <th>Ação</th>
  </tr>
</thead>

<tbody id="listaAgendamentos">
  <tr>
    <td colspan="7">
      Carregando...
    </td>
  </tr>
</tbody>
```

  </table>

</div>

<script src="admin.js"></script>

</body>
</html>
